<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8e9aaf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5568;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0037ff;stop-opacity:1" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Metallic Ring -->
  <circle cx="100" cy="100" r="90" stroke="url(#metal-grad)" stroke-width="8" />
  <circle cx="100" cy="100" r="82" stroke="#00f3ff" stroke-width="1" stroke-dasharray="4 2" opacity="0.5" />
  
  <!-- Curved Text Path -->
  <path id="textPath" d="M 100, 100 m -70, 0 a 70,70 0 1,1 140,0 a 70,70 0 1,1 -140,0" fill="none" />
  <text fill="#ffffff" font-family="Poppins, sans-serif" font-size="14" font-weight="800" letter-spacing="3">
    <textPath href="#textPath" startOffset="50%" text-anchor="middle">INTELLEXA 2026</textPath>
  </text>

  <!-- Wings -->
  <g transform="translate(100, 100)" filter="url(#neon-glow)">
    <!-- Right Wing -->
    <path d="M 15,-10 C 40,-35 70,-25 75,5 C 70,0 50,5 15,10 Z" fill="url(#blue-glow)" opacity="0.8">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- Left Wing -->
    <path d="M -15,-10 C -40,-35 -70,-25 -75,5 C -70,0 -50,5 -15,10 Z" fill="url(#blue-glow)" opacity="0.8">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Central Brain / Core -->
  <g transform="translate(100, 100)">
    <!-- Brain Silhouette -->
    <path d="M -15,-15 C -25,-15 -25,5 -10,10 C -10,15 10,15 10,10 C 25,5 25,-15 15,-15 C 10,-20 -10,-20 -15,-15 Z" fill="#ffffff" filter="url(#neon-glow)" />
    <!-- Neural Lines -->
    <path d="M -8,-5 H 8 M -6,0 H 6 M -8,5 H 8" stroke="#000a12" stroke-width="1.5" stroke-linecap="round" />
    <circle cx="0" cy="0" r="20" stroke="#00f3ff" stroke-width="2" stroke-dasharray="2 4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Tech Dots -->
  <circle cx="100" cy="30" r="3" fill="#ff5e00" filter="url(#neon-glow)" />
  <circle cx="100" cy="170" r="3" fill="#ff5e00" filter="url(#neon-glow)" />
  <circle cx="30" cy="100" r="3" fill="#ff5e00" filter="url(#neon-glow)" />
  <circle cx="170" cy="100" r="3" fill="#ff5e00" filter="url(#neon-glow)" />
</svg>
