<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Details | INTELLEXA '26</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ---- PAGE WRAPPER ---- */
    .event-page {
      max-width: 900px;
      margin: 110px auto 60px;
      padding: 0 20px;
    }

    /* ---- BADGE ---- */
    .event-type-badge {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .badge-tech {
      background: rgba(0, 55, 255, 0.2);
      border: 1px solid var(--blue);
      color: #7aaeff;
    }

    .badge-non-tech {
      background: rgba(255, 94, 0, 0.2);
      border: 1px solid var(--orange);
      color: #FFAA66;
    }

    .badge-workshop {
      background: rgba(0, 243, 255, 0.1);
      border: 1px solid var(--cyan);
      color: var(--cyan);
    }

    /* ---- TITLE ---- */
    .event-hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, #fff, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .event-tagline {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    /* ---- POSTER ---- */
    .poster-wrapper {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(0, 243, 255, 0.25);
      box-shadow: 0 0 40px rgba(0, 243, 255, 0.12);
      cursor: pointer;
      margin-bottom: 50px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .poster-wrapper:hover {
      transform: scale(1.01);
      box-shadow: 0 0 60px rgba(0, 243, 255, 0.25);
    }

    .poster-wrapper img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
    }

    .poster-expand-hint {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ---- LIGHTBOX ---- */
    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .lightbox-overlay.active {
      display: flex;
    }

    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 16px;
      border: 1px solid rgba(0, 243, 255, 0.3);
      box-shadow: 0 0 80px rgba(0, 243, 255, 0.3);
      animation: lightboxIn 0.3s ease;
    }

    @keyframes lightboxIn {
      from {
        transform: scale(0.85);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.2s;
    }

    .lightbox-close:hover {
      background: rgba(255, 94, 0, 0.4);
      border-color: var(--orange);
    }

    /* ---- SECTIONS ---- */
    .info-section {
      background: rgba(0, 10, 18, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 32px 36px;
      margin-bottom: 28px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .info-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--cyan), var(--blue));
      border-radius: 4px 0 0 4px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 16px;
    }

    .section-label i {
      font-size: 1rem;
    }

    .info-section p {
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    /* ---- RULES ---- */
    .rules-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .rules-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: #cbd5e1;
      font-size: 0.95rem;
      padding: 10px 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .rules-list li:last-child {
      border-bottom: none;
    }

    .rules-list li::before {
      content: '✦';
      color: var(--cyan);
      font-size: 0.7rem;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* ---- META GRID ---- */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }

    .meta-card {
      background: rgba(0, 10, 18, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .meta-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
    }

    .meta-card i {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }

    .meta-card .meta-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 6px;
    }

    .meta-card .meta-value {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    /* ---- PRIZE POOL ---- */
    .prize-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
    }

    .prize-card {
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .prize-card.gold {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 140, 0, 0.05));
      border: 1px solid rgba(255, 215, 0, 0.35);
    }

    .prize-card.silver {
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.15), rgba(128, 128, 128, 0.05));
      border: 1px solid rgba(192, 192, 192, 0.35);
    }

    .prize-card.bronze {
      background: linear-gradient(135deg, rgba(205, 127, 50, 0.15), rgba(139, 90, 43, 0.05));
      border: 1px solid rgba(205, 127, 50, 0.35);
    }

    .prize-card .prize-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .prize-card.gold .prize-icon {
      color: gold;
      text-shadow: 0 0 15px gold;
    }

    .prize-card.silver .prize-icon {
      color: silver;
      text-shadow: 0 0 15px silver;
    }

    .prize-card.bronze .prize-icon {
      color: #CD7F32;
      text-shadow: 0 0 15px #CD7F32;
    }

    .prize-card .prize-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #94a3b8;
    }

    .prize-card .prize-amount {
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }

    .prize-card.gold .prize-amount {
      color: gold;
    }

    .prize-card.silver .prize-amount {
      color: silver;
    }

    .prize-card.bronze .prize-amount {
      color: #CD7F32;
    }

    .prize-cert {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 6px;
    }

    /* ---- BACK BUTTON ---- */
    .back-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: linear-gradient(45deg, var(--blue), var(--cyan));
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 25px rgba(0, 243, 255, 0.3);
    }

    .back-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 40px rgba(0, 243, 255, 0.6);
    }

    .register-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: linear-gradient(45deg, var(--orange), #ff8c00);
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 25px rgba(255, 94, 0, 0.3);
    }

    .register-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 40px rgba(255, 94, 0, 0.6);
    }

    /* ---- DIVIDER ---- */
    .divider-glow {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      margin: 50px 0;
      opacity: 0.4;
    }

    /* ---- COORDINATORS ---- */
    .coord-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .coord-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: rgba(0, 10, 20, 0.5);
      border: 1px solid rgba(0, 243, 255, 0.12);
      border-radius: 14px;
      padding: 16px 22px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .coord-row:hover {
      border-color: rgba(0, 243, 255, 0.3);
      box-shadow: 0 4px 20px rgba(0, 243, 255, 0.07);
    }

    .coord-row.student-row {
      border-color: rgba(255, 94, 0, 0.12);
    }

    .coord-row.student-row:hover {
      border-color: rgba(255, 94, 0, 0.3);
      box-shadow: 0 4px 20px rgba(255, 94, 0, 0.07);
    }

    .coord-key {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .coord-key.faculty-key {
      background: rgba(0, 243, 255, 0.1);
      border: 1px solid rgba(0, 243, 255, 0.3);
      color: var(--cyan);
    }

    .coord-key.student-key {
      background: rgba(255, 94, 0, 0.1);
      border: 1px solid rgba(255, 94, 0, 0.3);
      color: var(--orange);
    }

    .coord-val {
      color: #e2e8f0;
      font-size: 0.97rem;
      line-height: 1.8;
      font-weight: 500;
    }

    @media(max-width: 600px) {
      .event-page {
        margin-top: 90px;
      }

      .info-section {
        padding: 22px 20px;
      }

      .poster-wrapper img {
        height: 220px;
      }

      .prize-card .prize-amount {
        font-size: 1.4rem;
      }

      .coord-row {
        flex-direction: column;
        gap: 8px;
        padding: 14px 16px;
      }

      .coord-row {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
