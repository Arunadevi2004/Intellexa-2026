  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ---- PAGE WRAPPER ---- */
    .event-page {
      max-width: 900px;
      margin: 110px auto 60px;
      padding: 0 20px;
    }

    /* ---- BADGE ---- */
    .event-type-badge {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .badge-tech {
      background: rgba(0,55,255,0.2);
      border: 1px solid var(--blue);
      color: #7aaeff;
    }
    .badge-non-tech {
      background: rgba(255,94,0,0.2);
      border: 1px solid var(--orange);
      color: #FFAA66;
    }
    .badge-workshop {
      background: rgba(0,243,255,0.1);
      border: 1px solid var(--cyan);
      color: var(--cyan);
    }

    /* ---- TITLE ---- */
    .event-hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, #fff, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .event-tagline {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    /* ---- POSTER ---- */
    .poster-wrapper {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(0,243,255,0.25);
      box-shadow: 0 0 40px rgba(0,243,255,0.12);
      cursor: pointer;
      margin-bottom: 50px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .poster-wrapper:hover {
      transform: scale(1.01);
      box-shadow: 0 0 60px rgba(0,243,255,0.25);
    }
    .poster-wrapper img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
    }
    .poster-expand-hint {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ---- LIGHTBOX ---- */
    .lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    .lightbox-overlay.active {
      display: flex;
    }
    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 16px;
      border: 1px solid rgba(0,243,255,0.3);
      box-shadow: 0 0 80px rgba(0,243,255,0.3);
      animation: lightboxIn 0.3s ease;
    }
    @keyframes lightboxIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.2s;
    }
    .lightbox-close:hover {
      background: rgba(255,94,0,0.4);
      border-color: var(--orange);
    }

    /* ---- SECTIONS ---- */
    .info-section {
      background: rgba(0,10,18,0.6);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 32px 36px;
      margin-bottom: 28px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .info-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--cyan), var(--blue));
      border-radius: 4px 0 0 4px;
    }
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 16px;
    }
    .section-label i {
      font-size: 1rem;
    }
    .info-section p {
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.8;
    }

    /* ---- RULES ---- */
    .rules-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .rules-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: #cbd5e1;
      font-size: 0.95rem;
      padding: 10px 0;
      border-bottom: 1px solid var(--glass-border);
    }
    .rules-list li:last-child { border-bottom: none; }
    .rules-list li::before {
      content: '✦';
      color: var(--cyan);
      font-size: 0.7rem;
      margin-top: 5px;
      flex-shrink: 0;
    }

    /* ---- META GRID ---- */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .meta-card {
      background: rgba(0,10,18,0.7);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .meta-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(0,243,255,0.1);
    }
    .meta-card i {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }
    .meta-card .meta-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 6px;
    }
    .meta-card .meta-value {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    /* ---- PRIZE POOL ---- */
    .prize-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
    }
    .prize-card {
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .prize-card.gold {
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,140,0,0.05));
      border: 1px solid rgba(255,215,0,0.35);
    }
    .prize-card.silver {
      background: linear-gradient(135deg, rgba(192,192,192,0.15), rgba(128,128,128,0.05));
      border: 1px solid rgba(192,192,192,0.35);
    }
    .prize-card.bronze {
      background: linear-gradient(135deg, rgba(205,127,50,0.15), rgba(139,90,43,0.05));
      border: 1px solid rgba(205,127,50,0.35);
    }
    .prize-card .prize-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .prize-card.gold .prize-icon { color: gold; text-shadow: 0 0 15px gold; }
    .prize-card.silver .prize-icon { color: silver; text-shadow: 0 0 15px silver; }
    .prize-card.bronze .prize-icon { color: #CD7F32; text-shadow: 0 0 15px #CD7F32; }
    .prize-card .prize-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #94a3b8;
    }
    .prize-card .prize-amount {
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1;
    }
    .prize-card.gold .prize-amount { color: gold; }
    .prize-card.silver .prize-amount { color: silver; }
    .prize-card.bronze .prize-amount { color: #CD7F32; }
    .prize-cert {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 6px;
    }

    /* ---- BACK BUTTON ---- */
    .back-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 40px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: linear-gradient(45deg, var(--blue), var(--cyan));
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 25px rgba(0,243,255,0.3);
    }
    .back-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 40px rgba(0,243,255,0.6);
    }
    .register-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: linear-gradient(45deg, var(--orange), #ff8c00);
      color: white;
      text-decoration: none;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 25px rgba(255,94,0,0.3);
    }
    .register-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 40px rgba(255,94,0,0.6);
    }

    /* ---- DIVIDER ---- */
    .divider-glow {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      margin: 50px 0;
      opacity: 0.4;
    }

    @media(max-width: 600px) {
      .event-page { margin-top: 90px; }
      .info-section { padding: 22px 20px; }
      .poster-wrapper img { height: 220px; }
      .prize-card .prize-amount { font-size: 1.4rem; }
    }
  </style>
</head>

        rules: [
          'Team size: 2 members per team.',

          'Buzzer rounds: First to buzz gets to answer; wrong answer results in -1 point.',
          'No mobile phones or external resources during the quiz.',
          'Decision of the quizmaster is final and binding.',
          'Ties will be broken by a sudden-death tiebreaker round.',
          'E-Certificate will be provided to all participants.'
        ],
        time: '10:30 AM – 12:30 PM',
        venue: 'Seminar Hall B, RIT Campus',
        team: '2 Members',
        prizes: [
          { rank: '1st', label: 'Champions', amount: '₹4,000', icon: '🥇', type: 'gold' },
          { rank: '2nd', label: 'Runner Up', amount: '₹2,000', icon: '🥈', type: 'silver' },
          { rank: 'All', label: 'E-Certificate', amount: 'For All', icon: '🏅', type: 'bronze' }
        ]
      },
      'mindlink-challenge': {
        title: 'MindLink Challenge',
        tagline: 'Connect Ideas and Solve Smartly',
        type: 'non-tech',
        poster: 'poster_mindlink.png',
        desc: 'MindLink Challenge is a multi-stage lateral thinking and word association game. Participants are presented with seemingly unrelated clues — images, words, sounds, and riddles — and must connect the dots to uncover a hidden link. Each stage unlocks a harder puzzle. It\'s the perfect combination of intellect, creativity, and teamwork!',
        rules: [
          'Team size: 2–3 members.',
          'Multiple stages — each stage is unlocked only after solving the previous one.',
          'Hints available (3 per team), but using a hint deducts points.',
          'Teams must submit answers via physical answer sheets.',
          'No internet access is allowed during the challenge.',
          'Time bonus applies — faster correct answers earn more points.',
          'E-Certificate will be provided to all participants.'
        ],
        time: '10:30 AM – 12:30 PM',
        venue: 'Smart Classroom, Block A, RIT Campus',
        team: '2–3 Members',
        prizes: [
          { rank: '1st', label: 'Winners', amount: '₹3,500', icon: '🥇', type: 'gold' },

          { rank: 'All', label: 'E-Certificate', amount: 'For All', icon: '🏅', type: 'bronze' }
        ]
      }
    };

    // ========= RENDER =========
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = (urlParams.get('event') || '').toLowerCase().trim();
    const ev = eventData[eventId];

    if (ev) {
      document.title = ev.title + " | INTELLEXA '26";

      // Badge
      const badge = document.getElementById('event-badge');
      badge.textContent = ev.type === 'tech' ? 'Technical Event'
                        : ev.type === 'non-tech' ? 'Non-Technical Event'
                        : 'Workshop';
      badge.className = 'event-type-badge '
                      + (ev.type === 'tech' ? 'badge-tech'
                       : ev.type === 'non-tech' ? 'badge-non-tech'
                       : 'badge-workshop');

      document.getElementById('event-title').textContent  = ev.title;
      document.getElementById('event-tagline').textContent = ev.tagline;
      document.getElementById('event-desc').textContent   = ev.desc;
      document.getElementById('event-time').textContent   = ev.time;
      document.getElementById('event-venue').textContent  = ev.venue;
      document.getElementById('event-team').textContent   = ev.team;

      // Poster
      const posterEl = document.getElementById('event-poster');
      posterEl.src = ev.poster;
      posterEl.alt = ev.title + ' Poster';

      // Rules
      const rulesList = document.getElementById('event-rules');
      ev.rules.forEach(r => {
        const li = document.createElement('li');
        li.textContent = r;
        rulesList.appendChild(li);
      });

      // Prizes
      const prizeGrid = document.getElementById('prize-grid');
      ev.prizes.forEach(p => {
        prizeGrid.innerHTML += `
          <div class="prize-card ${p.type}">
            <div class="prize-icon">${p.icon}</div>
            <div class="prize-label">${p.label}</div>
            <div class="prize-amount">${p.amount}</div>
          </div>`;
      });
    } else {
      document.getElementById('event-title').textContent = 'Event Not Found';
      document.getElementById('event-desc').textContent  = 'This event does not exist or the URL is incorrect.';
      document.getElementById('poster-wrapper').style.display = 'none';
    }

    // Lightbox
    function openLightbox() {
      const src = document.getElementById('event-poster').src;
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });
  </script>
</body>

</html>
